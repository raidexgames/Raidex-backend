<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>لوحة اللاعبين - Raidex</title>
  <style>
    body { font-family: sans-serif; background:#020617; color:#e5e7eb; padding:20px; }
    table { width:100%; border-collapse: collapse; margin-top:20px; }
    th, td { border:1px solid #374151; padding:8px; font-size:14px; text-align:center; }
    th { background:#111827; }
    tr:nth-child(even) { background:#020617; }
    tr:nth-child(odd) { background:#030712; }
    .btn-refresh { padding:8px 16px; border:none; background:#10b981; color:white; border-radius:6px; cursor:pointer; margin-bottom:10px; }
    .btn-delete { padding:4px 10px; border:none; background:#ef4444; color:white; border-radius:4px; cursor:pointer; }
    .btn-edit { padding:4px 10px; border:none; background:#3b82f6; color:white; border-radius:4px; cursor:pointer; }

    /* Modal تعديل */
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; }
    .modal.active { display:flex; }
    .modal-box { background:#111827; padding:24px; border-radius:10px; width:320px; }
    .modal-box h2 { margin-bottom:16px; font-size:18px; }
    .modal-box label { display:block; margin-bottom:4px; font-size:13px; color:#9ca3af; }
    .modal-box input { width:100%; padding:6px 10px; margin-bottom:12px; background:#1f2937; border:1px solid #374151; color:#e5e7eb; border-radius:4px; box-sizing:border-box; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; }
    .btn-save { padding:6px 16px; border:none; background:#10b981; color:white; border-radius:4px; cursor:pointer; }
    .btn-cancel { padding:6px 16px; border:none; background:#6b7280; color:white; border-radius:4px; cursor:pointer; }
  </style>
</head>
<body>
  <h1>لوحة اللاعبين</h1>
  <button class="btn-refresh" onclick="loadPlayers()">تحديث القائمة</button>

  <table id="playersTable">
    <thead>
      <tr>
        <th>Telegram ID</th>
        <th>الاسم</th>
        <th>Level</th>
        <th>XP</th>
        <th>Gold</th>
        <th>Wood</th>
        <th>Stone</th>
        <th>Tiger</th>
        <th>Elephant</th>
        <th>Gorilla</th>
        <th>إجراءات</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- Modal التعديل -->
  <div class="modal" id="editModal">
    <div class="modal-box">
      <h2>تعديل بيانات اللاعب</h2>
      <input type="hidden" id="editId" />
      abel>Level</label>
      <input type="number" id="editLevel" />
      abel>XP</label>
      <input type="number" id="editXp" />
      abel>Gold</label>
      <input type="number" id="editGold" />
      abel>Wood</label>
      <input type="number" id="editWood" />
      abel>Stone</label>
      <input type="number" id="editStone" />
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
        <button class="btn-save" onclick="saveEdit()">حفظ</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:3000";

    async function loadPlayers() {
      const tbody = document.querySelector("#playersTable tbody");
      tbody.innerHTML = "<tr><td colspan='11'>جاري التحميل...</td></tr>";
      try {
        const res = await fetch(API_BASE + "/players");
        const data = await res.json();
        tbody.innerHTML = "";
        data.forEach(p => {
          const resources = p.resources || {};
          const army = p.army || {};
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${p.telegramId || p.id || ""}</td>
            <td>${p.telegramName || p.name || ""}</td>
            <td>${p.level ?? ""}</td>
            <td>${p.xp ?? ""}</td>
            <td>${resources.gold ?? 0}</td>
            <td>${resources.wood ?? 0}</td>
            <td>${resources.stone ?? 0}</td>
            <td>${army.tiger ?? 0}</td>
            <td>${army.elephant ?? 0}</td>
            <td>${army.gorilla ?? 0}</td>
            <td>
              <button class="btn-edit" onclick='openEdit(${JSON.stringify(p)})'>تعديل</button>
              <button class="btn-delete" onclick="deletePlayer('${p.id}')">حذف</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) {
        console.error(e);
        tbody.innerHTML = "<tr><td colspan='11'>حصل خطأ في تحميل البيانات</td></tr>";
      }
    }

    async function deletePlayer(id) {
      if (!confirm("هل أنت متأكد من حذف اللاعب؟")) return;
      await fetch(API_BASE + "/players/" + id, { method: "DELETE" });
      loadPlayers();
    }

    function openEdit(p) {
      document.getElementById("editId").value = p.id;
      document.getElementById("editLevel").value = p.level ?? 1;
      document.getElementById("editXp").value = p.xp ?? 0;
      document.getElementById("editGold").value = p.resources?.gold ?? 0;
      document.getElementById("editWood").value = p.resources?.wood ?? 0;
      document.getElementById("editStone").value = p.resources?.stone ?? 0;
      document.getElementById("editModal").classList.add("active");
    }

    function closeModal() {
      document.getElementById("editModal").classList.remove("active");
    }

    async function saveEdit() {
      const id = document.getElementById("editId").value;
      const updates = {
        level: Number(document.getElementById("editLevel").value),
        xp: Number(document.getElementById("editXp").value),
        "resources.gold": Number(document.getElementById("editGold").value),
        "resources.wood": Number(document.getElementById("editWood").value),
        "resources.stone": Number(document.getElementById("editStone").value),
      };
      await fetch(API_BASE + "/players/" + id, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(updates)
      });
      closeModal();
      loadPlayers();
    }

    loadPlayers();
  </script>
</body>
</html>
